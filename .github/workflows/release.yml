name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New Version (e.g. 1.0.0, or leave empty for patch)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.0
          registry-url: 'https://registry.npmjs.org'

      - run: npm install
      - name: Bump Version
        id: bump
        run: |
            if [ -z "${{ inputs.version }}" ]; then
              npm version patch --no-git-tag-version > /dev/null
            else
              npm version ${{ inputs.version }} --no-git-tag-version > /dev/null
            fi
            echo "version=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      - run: npm run build
      - run: npm run lint
      - run: npm test
      - run: npm run test:performance
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add package.json
          git commit -m "release: ${{ steps.bump.outputs.version }}"
          git push
