name: CI
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
      - run: npm install
      - run: npm run build
      - run: npm run test
      - run: npm run test:performance
      - run: npm run lint
